spring:
  application:
    name: spring-ai-onboarding-service
  ai:
    openai:
      api-key: ${YOUR_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.7
          max-tokens: 500

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.context: DEBUG
